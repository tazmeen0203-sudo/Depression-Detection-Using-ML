<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- === SEO Optimization === -->
    <title>Depression Detection Using Machine Learning | AI Mental Health</title>
    <meta name="description" content="An advanced Machine Learning and AI-driven web application to detect signs of depression through linguistic patterns and sentiment analysis.">
    <meta name="keywords" content="depression detection, machine learning, AI, sentiment analysis, mental health AI, linguistic patterns, text analysis">
    <meta name="author" content="depression_detection">
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Depression Detection Using Machine Learning">
    <meta property="og:description" content="AI model trained to detect signs of depression from text and linguistic patterns.">
    <meta property="og:url" content="https://depression-detection.example.com/">
    
    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Depression Detection Using Machine Learning">
    <meta name="twitter:description" content="AI model trained to detect signs of depression from text and linguistic patterns.">

    <!-- Modern Typography: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    
    <!-- Feather Icons -->
    <script src="https://unpkg.com/feather-icons"></script>

    <style>
        /* === Color Palette & Variables === */
        :root {
            /* Background */
            --bg-base: #ffffff;
            
            /* Glassmorphism */
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.8);
            --glass-shadow: 0 15px 35px 0 rgba(31, 38, 135, 0.15);
            
            /* Text colors */
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            
            /* Brand / Accent colors */
            --accent-gradient: linear-gradient(135deg, #0ea5e9, #8b5cf6, #f43f5e);
            --accent-glow: rgba(139, 92, 246, 0.3);
            
            /* States */
            --state-depressed: #e11d48;
            --state-normal: #059669;
        }

        /* === Base Reset & Styles === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; 
            position: relative;
            padding: 20px;
        }

        /* === Animated Background Elements === */
        .ambient-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            z-index: -1;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.75;
            animation: float 20s infinite alternate ease-in-out;
        }

        .blob-1 {
            width: 500px;
            height: 500px;
            background: #ff7eb3;
            top: -100px;
            left: -100px;
        }

        .blob-2 {
            width: 600px;
            height: 600px;
            background: #65d5ff;
            bottom: -200px;
            right: -100px;
            animation-delay: -5s;
        }
        
        .blob-3 {
            width: 500px;
            height: 500px;
            background: #b176ff;
            top: 30%;
            left: 40%;
            transform: translate(-50%, -50%);
            animation-duration: 25s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, -80px) scale(1.15); }
        }

        /* === Main Interface Container === */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 2px solid var(--glass-border);
            border-radius: 28px;
            padding: 48px;
            width: 100%;
            max-width: 650px;
            box-shadow: var(--glass-shadow);
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
            z-index: 10;
        }

        @keyframes slideUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* === Header === */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header .icon-container {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            border-radius: 20px;
            background: #ffffff;
            border: 2px solid rgba(255, 255, 255, 0.8);
            margin-bottom: 24px;
            color: #8b5cf6;
            box-shadow: 0 10px 25px var(--accent-glow);
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: capitalize;
            line-height: 1.2;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1.05rem;
            line-height: 1.6;
            font-weight: 400;
        }

        /* === Form Elements === */
        .input-group {
            position: relative;
            margin-bottom: 32px;
        }

        textarea {
            width: 100%;
            height: 160px;
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.9);
            border-radius: 16px;
            padding: 24px;
            color: var(--text-primary);
            font-size: 1.05rem;
            font-weight: 500;
            line-height: 1.6;
            resize: none;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02), 0 5px 15px rgba(0,0,0,0.05);
        }

        textarea::placeholder {
            color: #94a3b8;
            font-weight: 400;
        }

        textarea:focus {
            border-color: #8b5cf6;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.2), inset 0 2px 4px rgba(0,0,0,0.01);
        }

        /* === Button === */
        button {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            border: none;
            background: var(--accent-gradient);
            color: white;
            font-size: 1.15rem;
            font-weight: 700;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 10px 25px -5px rgba(139, 92, 246, 0.5);
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.6s ease;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px -5px rgba(139, 92, 246, 0.6);
        }

        button:hover::before {
            left: 100%;
        }

        button:active {
            transform: translateY(1px);
            box-shadow: 0 5px 15px -5px rgba(139, 92, 246, 0.5);
        }

        button:disabled {
            opacity: 0.8;
            cursor: not-allowed;
            transform: none;
        }

        /* === Result Area === */
        .result-container {
            margin-top: 32px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #ffffff;
            border-radius: 16px;
            text-align: center;
            position: relative;
            overflow: hidden;
            
            /* Initial Hidden State */
            height: 0;
            opacity: 0;
            padding: 0;
            margin-top: 0;
            border-width: 0;
            transform: scale(0.95) translateY(-10px);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .result-container.active {
            height: auto;
            opacity: 1;
            padding: 32px;
            margin-top: 32px;
            border-width: 2px;
            transform: scale(1) translateY(0);
        }

        .result-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-secondary);
            margin-bottom: 12px;
            font-weight: 600;
        }

        .result-value {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .result-value.depressed {
            color: var(--state-depressed);
        }

        .result-value.normal {
            color: var(--state-normal);
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255,255,255,0.4);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-text {
            transition: opacity 0.3s;
        }

        button.loading .btn-text {
            display: none;
        }
        
        button.loading .spinner {
            display: block;
        }
        
        button.loading i {
            display: none;
        }

        /* === Responsive Styles for Mobile === */
        @media (max-width: 768px) {
            body {
                padding: 16px;
                /* Allow scrolling on mobile if the content is taller than the screen */
                overflow-y: auto;
                align-items: flex-start; 
                padding-top: 40px;
                padding-bottom: 40px;
            }

            .glass-card {
                padding: 32px 24px;
                border-radius: 20px;
            }

            .header {
                margin-bottom: 32px;
            }

            .header .icon-container {
                width: 54px;
                height: 54px;
                margin-bottom: 20px;
            }

            .header h1 {
                font-size: 1.6rem;
                margin-bottom: 10px;
            }

            .header p {
                font-size: 0.95rem;
            }

            textarea {
                height: 130px;
                padding: 20px;
                font-size: 1rem;
            }

            button {
                padding: 16px;
                font-size: 1.05rem;
            }

            .result-container.active {
                padding: 24px 20px;
            }

            .result-value {
                font-size: 1.5rem;
                flex-direction: column;
                gap: 8px;
            }
            
            /* Adjust blobs for smaller screens */
            .blob {
                filter: blur(60px);
            }
            .blob-1 {
                width: 300px;
                height: 300px;
            }
            .blob-2 {
                width: 350px;
                height: 350px;
            }
            .blob-3 {
                width: 250px;
                height: 250px;
            }
        }
        
        @media (max-width: 480px) {
            .glass-card {
                padding: 24px 16px;
            }
            .header h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>

    <!-- Ambient Background Blobs -->
    <div class="ambient-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Main Card -->
    <div class="glass-card">
        
        <div class="header">
            <div class="icon-container">
                <i data-feather="smile"></i>
            </div>
            <h1>depression detection using machine_learning</h1>
            <p>Advanced AI model trained to detect signs of depression from linguistic patterns in your text.</p>
        </div>

        <form id="aiForm">
            <div class="input-group">
                <textarea id="userInput" placeholder="How are you feeling today? Share your thoughts, a recent tweet, or your general state of mind..." required></textarea>
            </div>
            <button type="submit" id="analyzeBtn">
                <span class="btn-text">Run Analysis</span>
                <i data-feather="arrow-right"></i>
                <div class="spinner"></div>
            </button>
        </form>

        <div class="result-container" id="resultContainer">
            <div class="result-label">Model Prediction</div>
            <div class="result-value" id="resultText">
                <!-- Result injected here via JS -->
            </div>
        </div>

    </div>

    <script>
        // Initialize Feather Icons
        feather.replace();

        document.getElementById('aiForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('analyzeBtn');
            const input = document.getElementById('userInput').value.toLowerCase();
            const resultContainer = document.getElementById('resultContainer');
            const resultText = document.getElementById('resultText');

            // Reset UI state
            resultContainer.classList.remove('active');
            
            // Set loading state
            btn.classList.add('loading');
            btn.disabled = true;

            // Simulate AI processing delay for premium feel
            setTimeout(() => {
                
                // --- Predifined Logic ---
                let status = "normal";
                let text = "Not Depressed";
                let icon = "check-circle";
                
                const depressedKeywords = ["hopeless", "empty", "sad", "overwhelmed", "depressed", "can't sleep", "cry", "pain", "worthless"];
                
                // Check if any negative keyword exists in input
                const isDepressed = depressedKeywords.some(keyword => input.includes(keyword));

                if (isDepressed) {
                    status = "depressed";
                    text = "Depression Detected";
                    icon = "alert-triangle";
                }

                // Update Result UI
                resultText.className = `result-value ${status}`;
                resultText.innerHTML = `
                    <i data-feather="${icon}"></i>
                    <span>${text}</span>
                `;
                
                // Re-render the newly injected feather icon
                feather.replace();

                // Show result with animation
                resultContainer.classList.add('active');

                // Remove loading state
                btn.classList.remove('loading');
                btn.disabled = false;

                // On mobile, scroll to the result if it's off-screen
                if (window.innerWidth <= 768) {
                    setTimeout(() => {
                        resultContainer.scrollIntoView({ behavior: 'smooth', block: 'end' });
                    }, 100);
                }

            }, 1200); // 1.2s fake loading
        });
    </script>
</body>
</html>
